kind = "web"
previewPath = "/"
title = "AgentHub AI"
version = "1.0.0"
id = "artifacts/agent-hub"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18509

[services.development]
run = "pnpm --filter @workspace/agent-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/agent-hub", "run", "build" ]
serve = "static"
publicDir = "artifacts/agent-hub/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18509"
BASE_PATH = "/"
